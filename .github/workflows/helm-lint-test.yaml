name: Lint and test Helm chart

on:
  pull_request:
    paths:
    - 'deployment/**/*'
  workflow_dispatch:
    inputs:
      force_install_unchanged:
        description: 'Force install even if chart is unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Determine if install is needed
        id: should-install
        run: |
          if [[ "${{ github.event.inputs.force_install_unchanged }}" == "true" ]] || ct list-changed --config deployment/ct.yaml | grep -q .; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        if: steps.should-install.outputs.result == 'true'
        run: ct lint ${{ github.event.inputs.force_install_unchanged == 'true' && '--all' || '' }} --config deployment/ct.yaml

      - name: Create kind cluster
        if: steps.should-install.outputs.result == 'true'
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.24.0
          node_image: kindest/node:v1.32.0

      - uses: azure/setup-kubectl@v4
        if: steps.should-install.outputs.result == 'true'
        id: install
      - name: Setup OpenShift dependencies
        if: steps.should-install.outputs.result == 'true'
        run: |
          kubectl apply -f deployment/hack/crds/*.yaml
          kubectl wait --for condition="established" -f deployment/hack/crds/*.yaml
          kubectl create ns console-plugin-nvidia-gpu
          openssl req -x509 \
            -newkey rsa:2048  \
            -sha256 \
            -new -nodes  \
            -days 365 \
            -keyout ca.key \
            -out ca.crt \
            -subj "/CN=example.com"
          kubectl create -n console-plugin-nvidia-gpu secret tls plugin-serving-cert --key ca.key --cert ca.crt

      - name: Run chart-testing (install)
        if: steps.should-install.outputs.result == 'true'
        run: ct install ${{ github.event.inputs.force_install_unchanged == 'true' && '--all' || '' }} --namespace console-plugin-nvidia-gpu --config deployment/ct.yaml --debug
